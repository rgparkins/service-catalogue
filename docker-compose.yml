services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak/realm-service-catalogue.json:/opt/keycloak/data/import/realm-service-catalogue.json:ro
    ports:
      - "8080:8080"
    networks:
      - test-network
  app:
    container_name: app
    build:
      context: ./src/api/app
    networks:
      test-network:
    environment:
      MONGODB_ATLAS_URI: mongodb://mongodb:27017
      SEED_TENANT_ID: TalentConsultingSandBox
      SEED_TENANT_COMPANY_NAME: TalentConsultingSandBox
      SEED_TENANT_BILLING_EMAIL: sandbox@example.com
      SEED_TENANT_API_KEY: talent-sandbox-api-key
      # Token issuer is what the browser sees (VITE_KEYCLOAK_URL).
      KEYCLOAK_ISSUER: http://localhost:8080/realms/service-catalogue
      # JWKS issuer is what the API container can reach on the Docker network.
      KEYCLOAK_JWKS_ISSUER: http://keycloak:8080/realms/service-catalogue
      # KEYCLOAK_AUDIENCE: service-catalogue-api
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: service-catalogue
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_WEB_CLIENT_ID: service-catalogue-web
      PUBLIC_APP_URL: http://localhost:5173
      EXPOSE_REGISTRATION_LINK: "true"
      # SMTP_HOST: smtp.example.com
      # SMTP_PORT: "587"
      # SMTP_USER: user
      # SMTP_PASS: pass
      # SMTP_FROM: no-reply@example.com
    depends_on:
      - mongodb
      - keycloak
    ports:
      - "3000:3000"
  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: service-catalogue
    networks:
      test-network:
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH: "false"
    networks:
      - test-network
    ports:
      - "8081:8081"
  test:
    build:
      context: ./src/api/test
    environment:
      - SERVICE_UNDER_TEST_HOSTNAME=app:3000
    entrypoint: sh -c "ls -la ./features && npm install && ./node_modules/.bin/cucumber-js ./features/**/*.feature --exit"
    networks:
      test-network:
    depends_on:
      - app
  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: web
    volumes:
      - ./src/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_SERVICE_METADATA_URL=${SERVICE_METADATA_URL}
      - VITE_KEYCLOAK_URL=http://localhost:8080
      - VITE_KEYCLOAK_REALM=service-catalogue
      - VITE_KEYCLOAK_CLIENT_ID=service-catalogue-web
    networks:
      - test-network
networks:
  test-network:
    driver: bridge
volumes:
  mongodb_data:
